default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: relay-fmt-check
        name: Relay Format Check
        entry: bash -c 'cd relay && cargo fmt --all --check'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: relay-clippy
        name: Relay Clippy
        entry: bash -c 'cd relay && cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: relay-test
        name: Relay Tests
        entry: bash -c 'cd relay && cargo test --locked'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: ui-fmt-check
        name: UI Format Check
        entry: bash -c 'cd ui && bun run fmt:check'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: ui-lint
        name: UI Lint And Typecheck
        entry: bash -c 'cd ui && bun run lint:errors && bun run typecheck'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: ui-test
        name: UI Tests With Coverage
        entry: bash -c 'cd ui && bun run test:coverage'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: cli-test
        name: CLI Tests With Coverage
        entry: bash -c 'cd cli && bun run test:coverage'
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
