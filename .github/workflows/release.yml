name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check relay formatting
        run: cargo fmt --all --check
        working-directory: relay

      - name: Lint relay
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: relay

      - name: Test relay
        run: cargo test --locked
        working-directory: relay

      - name: Install UI dependencies
        run: bun install --frozen-lockfile
        working-directory: ui

      - name: Check UI formatting
        run: bun run fmt:check
        working-directory: ui

      - name: Lint UI
        run: bun run lint:errors
        working-directory: ui

      - name: Typecheck UI
        run: bun run typecheck
        working-directory: ui

      - name: Test UI with coverage
        run: bun run test:coverage
        working-directory: ui

      - name: Install CLI dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Test CLI with coverage
        run: bun run test:coverage
        working-directory: cli

  build-linux-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - test
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build release relay
        run: cargo build --locked --release
        working-directory: relay

      - name: Install UI dependencies
        run: bun install --frozen-lockfile
        working-directory: ui

      - name: Build UI
        run: bun run build
        working-directory: ui

      - name: Package release artifact
        run: bash scripts/package-release.sh x86_64-unknown-linux-gnu relay/target/release/resq-flow-relay ui/dist ui/src/flow-contracts ui/src/flow-definitions dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: resq-flow-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86_64
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: resq-flow-linux-x86_64
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
